<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 414" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Why the doubling-cavity lock bandwidth is the binding linewidth target: seed frequency noise is low-pass filtered by the LBO cavity lock and converted to amplitude noise on the harmonic, which propagates through the BBO cavity to the 280 nm output.">
  <title>Frequency-noise to amplitude-noise conversion in the doubling chain</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b6b6b"/>
    </marker>
  </defs>
  <rect width="700" height="414" fill="#faf8f4"/>

  <!-- B1 seed frequency noise -->
  <rect x="140" y="22" width="360" height="46" rx="6" fill="#faf8f4" stroke="#2c5f7c" stroke-width="1.4"/>
  <text x="320" y="50" text-anchor="middle" font-size="14" fill="#1a1a1a">Seed frequency noise  S<tspan font-size="10" dy="3">ν</tspan><tspan dy="-3">(f)</tspan>  at 1118 nm</text>
  <line x1="320" y1="68" x2="320" y2="88" stroke="#6b6b6b" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- B2 LBO lock (highlighted) -->
  <rect x="140" y="90" width="360" height="56" rx="6" fill="#2c5f7c" fill-opacity="0.12" stroke="#2c5f7c" stroke-width="1.6"/>
  <text x="320" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">LBO ring cavity — Hänsch–Couillaud lock</text>
  <text x="320" y="133" text-anchor="middle" font-size="12.5" fill="#2c5f7c">lock bandwidth ≈ 18 kHz</text>
  <text x="512" y="112" font-size="11.5" fill="#6b6b6b">low-passes seed FM</text>
  <text x="512" y="127" font-size="11.5" fill="#6b6b6b">above ≈ 18 kHz —</text>
  <text x="512" y="142" font-size="11.5" fill="#6b6b6b">only in-band noise</text>
  <text x="512" y="157" font-size="11.5" fill="#6b6b6b">converts</text>
  <line x1="320" y1="146" x2="320" y2="172" stroke="#6b6b6b" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="332" y="164" font-size="11.5" font-style="italic" fill="#c0392b">frequency → amplitude</text>

  <!-- B3 amplitude noise 559 -->
  <rect x="140" y="174" width="360" height="46" rx="6" fill="#faf8f4" stroke="#2c5f7c" stroke-width="1.4"/>
  <text x="320" y="202" text-anchor="middle" font-size="14" fill="#1a1a1a">Amplitude noise on 559 nm</text>
  <line x1="320" y1="220" x2="320" y2="240" stroke="#6b6b6b" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- B4 BBO -->
  <rect x="140" y="242" width="360" height="46" rx="6" fill="#faf8f4" stroke="#2c5f7c" stroke-width="1.4"/>
  <text x="320" y="270" text-anchor="middle" font-size="14" fill="#1a1a1a">BBO ring cavity</text>
  <line x1="320" y1="288" x2="320" y2="308" stroke="#6b6b6b" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- B5 output -->
  <rect x="140" y="310" width="360" height="46" rx="6" fill="#2c5f7c" fill-opacity="0.15" stroke="#2c5f7c" stroke-width="1.6"/>
  <text x="320" y="338" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Amplitude noise on 280 nm  →  ion</text>

  <text x="320" y="388" text-anchor="middle" font-size="11.5" fill="#6b6b6b">The seed's integrated linewidth may exceed 18 kHz; what matters is its frequency-noise density at and below ≈ 18 kHz.</text>
</svg>
