cross_check_notes:
  - id: "kiefer_is_the_in_house_vecsel_origin"
    summary: >
      Kiefer2020 is the dissertation in which the AG Schaetz / mg-plus-uv-chain
      VECSEL platform first appears as a built and characterised laser at the
      1118 nm Friedenauer fundamental. The Burd2016 NIST/Tampere design [46] is
      cited as the source; the implementation here is the Freiburg adaptation,
      with vendor-specific parts (Vexlum gain mirror, Layertec outcoupler,
      LightMachinery etalon, Newlight Photonics BRF, Ostech pump, Arroyo TECs,
      HighFinesse wavemeter) that propagate into Guth2021, Spanke2023, and
      Spanke2025. Operationally, this is the laser that was running 25Mg+
      experiments at the time of the Floquet results in the dissertation.
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "vendor_parts_chain_is_stable"
    summary: >
      The intracavity BRF (Newlight BIR0030), etalon (LightMachinery
      OP-3167-1000), gain mirror vendor (Vexlum), and pump diode (Ostech 40 W
      808 nm) are common across all four in-house theses (Kiefer2020 ->
      Guth2021 -> Spanke2023 -> Spanke2025). The thermal-management,
      cavity-length, and control-electronics layers are what evolve. This
      stability is the practical anchor for the steward direction (2026-05-08)
      that VECSELs are the seed-laser source class for current and future
      builds: continuity is demonstrated, not asserted.
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "shg_chain_is_friedenauer2006_topology"
    summary: >
      The SHG chain in Kiefer2020 (LBO bow-tie ring + BBO ring, both
      Haensch-Couillaud-locked) is the Friedenauer2006 topology, ported to the
      in-house in-house VECSEL seed. Reference [110] in Section 3.3.2 of the
      dissertation cites Friedenauer2006 directly. This is the operational
      validation that the VECSEL seed-class direction (Burd2023 anchor) and
      the LBO+BBO doubling-chain topology (Friedenauer2006 anchor) are
      independent, composable choices - the Kiefer2020 chain is the
      composition.
    informs_dossier_entries:
      - "KD-UV280-015"
