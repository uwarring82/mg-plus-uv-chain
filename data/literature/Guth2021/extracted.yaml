cross_check_notes:
  - id: "guth_first_quantitative_in_house_linewidth"
    summary: >
      Guth2021 is the first AG Schaetz thesis with a quantitative in-house
      VECSEL linewidth measurement. Iodine-locked Allan deviation at 100 ms
      is 1.207(12) MHz. Previous in-house statements (Kiefer2020) cited
      Burd2016's ~ 50 kHz figure without measuring directly. The Guth2021
      number is about 12x broader than Burd2016 / Burd2023 940 nm VECSELs,
      indicating that the first in-house build did not reach
      design-principle-level performance. Spanke2025 closes most of this
      gap (101(8) kHz locked, with noise-isolation box).
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "lbo_v3_to_v2_jump_is_passive_losses"
    summary: >
      The LBO v3 cavity achieves 87(6) % NIR -> visible conversion at 1.27 W
      coupled IR; v2 achieved only 56(4) %. The figure-of-merit x' decreased
      from 0.054(4) /sqrt(W) (v2) to 0.0008(2) /sqrt(W) (v3) - a ~ 70x
      reduction in (passive_losses / sqrt(SHG_efficiency)). For Phase NG-A
      (LBO L_passive gap closure in the next-gen workplan), this is the
      operational benchmark: in-house cavity-build practice can produce
      sub-percent passive losses on the LBO ring at 1118 nm. Carried forward
      to the architecture-comparison framework as an upstream operational
      datum.
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "shg_chain_reproduces_friedenauer2006"
    summary: >
      The Guth2021 SHG chain (LBO bow-tie ring with HC lock + BBO ring with
      HC lock, NIR -> visible -> UV at 280 nm) reproduces the Friedenauer2006
      topology with the in-house VECSEL substituted for the Yb-fibre seed.
      The 78(5) mW UV output at 780(15) mW visible input is below the
      Friedenauer2006 reference baseline but consistent with the early-build
      stage of the new BBO cavity (no stability characterisation yet at
      the time of writing).
    informs_dossier_entries:
      - "KD-UV280-015"
