parameters:
  - symbol: "Mg_Doppler_architecture_route"
    value_text: "Dye laser at 560 nm (similar to Be+ laser system) -> BBO doubling cavity -> 280 nm. Dither-locked to a reference cavity external to the dye-laser cavity."
    units: null
    location_in_paper: "Section 3.2.3, page 39"
    notes: "Mg-Doppler laser system at NIST Boulder. Architecture parallels the Kjaergaard2000 Aarhus dye-laser + BBO at 280 nm. UV output power not given in the thesis."

  - symbol: "Mg_Raman_architecture_route"
    value_text: "Yb-fiber laser at 1120 nm (similar to Al+ laser system) -> LBO doubling cavity -> 560 nm -> BBO doubling cavity -> 280 nm. Natural fiber-laser stability sufficient for stimulated Raman transitions; not stabilised to any external reference."
    units: null
    location_in_paper: "Section 3.2.3, page 39"
    notes: "Mg-Raman laser system at NIST Boulder. Architecture parallels Friedenauer 2006 (1118 nm) and Hemmerling2011 (1118.21 nm). UV output power not given in the thesis."

  - symbol: "lambda_Mg_Raman_fundamental"
    value: 1120e-9
    units: "m"
    location_in_paper: "Section 3.2.3, page 39"
    notes: "Yb-fiber-laser fundamental wavelength for Mg+ stimulated Raman transitions at NIST Boulder. 2 nm offset from Friedenauer 2006 (1118 nm); operationally outside the 14-GHz unlockable window characterised in Friedenauer 2006 (1118.339-1118.409 nm)."

  - symbol: "lambda_Mg_Doppler_fundamental"
    value: 560e-9
    units: "m"
    location_in_paper: "Section 3.2.3, page 39"
    notes: "Dye-laser visible wavelength feeding the Mg-Doppler BBO doubling cavity. Same as the Friedenauer / Hemmerling 559 nm intermediate (within 1 nm; Hume reports 560 nm for the Doppler chain)."

  - symbol: "Mg_hyperfine_splitting"
    value: 1.8e9
    units: "Hz"
    location_in_paper: "Section 3.2.3, page 39"
    notes: "Mg+ hyperfine splitting spanned by AOMs in both Mg-Doppler and Mg-Raman chains. Cf. Hemmerling2011 1.789 GHz."

  - symbol: "Yb_fiber_amplifier_pump_power"
    value: 4.0
    units: "W"
    location_in_paper: "Section 3.2.2, page 37"
    notes: "Pump power for the home-built Yb-doped fiber amplifier used in the Al+ system (the Mg-Raman system uses a similar configuration, per §3.2.3)."

  - symbol: "Yb_fiber_amplifier_pump_lambda"
    value: 976e-9
    units: "m"
    location_in_paper: "Section 3.2.2, page 37"
    notes: "Pump-diode wavelength for the Yb-fiber amplifier."

  - symbol: "LBO_NCPM_temperature"
    value: 140
    units: "degC"
    location_in_paper: "Section 3.2.2, page 37"
    notes: "LBO crystal NCPM phase-matching temperature in the Al+ system (used as analogous reference for the Mg-Raman 1120 nm -> 560 nm SHG stage). Cf. Friedenauer 2006: 89-94 deg C at 1118 nm."

  - symbol: "LBO_crystal_length_Al_system"
    value: 0.02
    units: "m"
    location_in_paper: "Section 3.2.2, page 37"
    notes: "LBO crystal length in the Al+ system (2 cm). Cf. Friedenauer 2006: 1.8 cm at 1118 nm and Hemmerling2011: 1.8 cm at 1118.21 nm. Hume's NIST LBO is slightly longer."

  - symbol: "Al_3P0_UV_power"
    value: 1e-3
    units: "W"
    location_in_paper: "Section 3.2.2, page 37"
    notes: "3P0 (clock) laser UV power at 267 nm. Used as adjacent-architecture context only; Mg+ UV power at 280 nm is not given in the thesis."

  - symbol: "Al_3P1_UV_power_range"
    value: [5e-3, 25e-3]
    units: "W"
    location_in_paper: "Section 3.2.2, page 37"
    notes: "3P1 laser UV power range at 267 nm. Used as adjacent-architecture context only. Al+ uses BBO for the 3P0 doubler and KD*P for the 3P1 doubler; Mg-Raman uses BBO for both the 1120 -> 560 nm and 560 -> 280 nm stages."

