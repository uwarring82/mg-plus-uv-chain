cross_check_notes:
  - id: "thesis_S_tier_caveat"
    summary: >
      Hume2010 is an unpublished PhD thesis. Source-tier S. Cannot be
      the sole anchor for any KD-UV280-005 / -009 / -011 / -012
      Section C constraint. Used here only for KD-UV280-001 / -015
      architecture-family corroboration alongside the peer-reviewed
      Friedenauer2006, Hemmerling2011, Burd2016, and Kjaergaard2000.
    informs_dossier_entries:
      - "KD-UV280-001"

  - id: "1120_nm_vs_1118_nm_lineage"
    summary: >
      The NIST Mg-Raman fiber-laser fundamental wavelength is 1120 nm,
      vs Friedenauer 2006's 1118 nm and Hemmerling2011's 1118.21 nm.
      The 2-nm spread across the lineage represents different
      manufacturers / model years of Yb-fiber laser; operationally
      these all double to 559-560 nm and quadruple to 279.5-280 nm
      with the same Type-I BBO geometry.
    resolution: >
      Document the wavelength variation in KD-UV280-001 / -015 Section
      C. The 14-GHz unlockable domain reported by Friedenauer 2006
      (1118.339-1118.409 nm) does not appear to be addressed in the
      Hume2010 thesis; the NIST 1120 nm operating point is well
      outside this domain so its absence in the thesis is consistent
      with non-observation rather than disproof.
    informs_dossier_entries:
      - "KD-UV280-001"
      - "KD-UV280-010"
      - "KD-UV280-015"
