  - "Confirm whether the 130 h uninterrupted operation at 313 nm is bracketed by any auxiliary observation of the cavity gas environment, crystal temperature, or intracavity intensity. The abstract quotes only the headline 'no decay in output power'; the body may give a power-decay-rate upper bound and the operating conditions under which it was observed."
  - "Decide how the 313 nm result maps onto KD-UV280-005 at 280 nm. 313 nm sits ~ 100 nm above the BBO UV-onset (215 nm); 280 nm sits ~ 65 nm above the UV-onset. The 130 h no-decay observation is therefore an UPPER-wavelength bracket for the BBO CW operational-lifetime envelope; combined with Kondo1998 and Kubota1998 at 266 nm (which bracket the 280 nm point from below in wavelength), the published wavelength brackets are 266 nm < 280 nm < 313 nm."
  - "Cross-reference vibration-robustness data (1 g, 3 g_rms) against the transportable-setup direction in the next-gen 500 mW workplan (logbook/2026-05-08-next-gen-500mW-workplan.md)."

