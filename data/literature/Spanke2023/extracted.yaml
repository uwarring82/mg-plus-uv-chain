cross_check_notes:
  - id: "spanke2023_isolates_thermal_noise_drivers"
    summary: >
      Spanke2023 isolates two specific thermal-noise drivers of the in-house
      VECSEL Nr.4 short-term frequency stability: (i) the legacy water
      chiller's cooling-cycle modulation, fixed by replacement with a
      PC-water-cooling loop, and (ii) the pump-fibre output holder thermal
      drift, fixed by a copper cooling sleeve. The combined improvement is
      a factor of ~ 5 in short-term stability (1.6 MHz Guth2021 free-running
      -> 300-400 kHz Spanke2023 free-running). This identifies the
      load-bearing noise sources for the seed-laser-linewidth budget at
      the in-house operating point and feeds directly into the design
      decision in Spanke2025 (neXt VECSEL) to pursue passive thermal
      management with mechanical noise isolation rather than further
      active-cooling refinement.
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "free_running_long_term_drift_within_piezo_range"
    summary: >
      Long-term Allan variance of the new water-cooled VECSEL Nr.4 is far
      below the 100 MHz piezo correction range. Operationally this means
      the laser can run free for several hours and still be tracked by
      piezo correction; iodine or wavemeter lock is needed only for
      absolute-frequency reference and longer-term operation. This is the
      operational baseline against which the seed-laser linewidth budget
      in 'docs/components/seed-lasers.md' is set.
    informs_dossier_entries:
      - "KD-UV280-015"
