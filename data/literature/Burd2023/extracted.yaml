    by: "assistant under steward direction"
    scope: >
      Initial extraction from the open-access JOSAB version of the paper.
      Sections covered: §1 introduction (VECSEL design philosophy, class-A
      dynamics motivation), §2 VECSEL designs (gain-mirror materials and
      heat-management for both 940 nm and 1252 nm; intracavity BRF + etalon +
      PZT mode-selection scheme; output-coupler geometry; long-term stability),
      §3 235 nm chain (PPKTP enhancement cavity, BBO buildup cavity, 9Be+
      photoionisation validation), §4 313 nm chain (PPLN waveguide doubler,
      BBO buildup cavity, 9Be+ Doppler cooling and repumping validation).
    status: "DRAFT"

cross_check_notes:
  - id: "linewidth_principle_carries_to_mg_plus_uv_chain"
    summary: >
      Burd2023 §1-§2 makes explicit the design principle that the seed
      VECSEL linewidth must be considerably less than the relevant atomic
      linewidth and the SHG-cavity locking bandwidth, so that frequency
      noise is not converted to amplitude noise by the resonant doubling
      stages. The 940 nm system meets this with <100 kHz; the 1252 nm
      system meets it with <110 kHz. For mg-plus-uv-chain at 1118 nm, the
      same principle binds: the 25Mg+ 3P1/2-3P3/2 detuning window
      (Delta_ref = 40 GHz at G3 closure) and the LBO+BBO cavity-locking
      bandwidths set the seed-laser linewidth budget. Friedenauer 2006
      operated at <200 kHz; the VECSEL state of the art at 1117 nm
      (Burd2016) is <50 kHz; Burd2023 confirms <100 kHz at adjacent
      wavelengths is routine. The design principle scales.
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "class_A_regime_distinguishes_VECSEL_from_fiber"
    summary: >
      The class-A laser regime (photon-lifetime dominated, no relaxation
      oscillation, suppressed ASE pedestal) is the load-bearing reason
      Burd2023 prefers VECSELs to fiber lasers for this application. For
      mg-plus-uv-chain this argument bears directly on §8.5 of CHARTER
      (RIN budget): a VECSEL seed laser would replace the Friedenauer
      Yb-fiber 1.2 W ASE budget (Friedenauer2006 P_ASE) with a
      structurally narrower spectrum, removing ASE-handling components
      from the source-conditioning chain. That is a material change to
      the upstream architecture and belongs in any future architecture-
      comparison evaluation under Phase 4 axis 4 (thermal/nonlinear load,
      since ASE contributes thermal load) and axis 6 (complexity).
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "wavelength_gap_to_mg_plus_uv_chain_1118nm"
    summary: >
      Burd2023 demonstrates VECSELs at 940 nm and 1252 nm. Neither
      hits the 1118 nm fundamental of the Friedenauer 25Mg+ chain, but
      Burd2016 already demonstrates 1117 nm and 1141 nm VECSELs from the
      same NIST + Tampere collaboration. The 1118 nm wavelength is
      therefore in the demonstrated-gain-mirror envelope; the design
      principles in Burd2023 transfer without wavelength-specific
      caveats, with the proviso that the gain-mirror MBE growth and
      diamond bonding would have to be respecified for the 1118 nm
      target (in collaboration with Tampere ORC under Guina). This is
      not a Phase 4 input pre-G1, but it is a viable upstream path that
      replaces the Friedenauer Yb-fiber pump.
    informs_dossier_entries:
      - "KD-UV280-015"
