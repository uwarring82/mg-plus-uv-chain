cross_check_notes:
  - id: "scout_pass_authorship_correction"
    summary: >
      The Task-E scaffold (74d4e86 commit) noted that the scout-pass
      author guess included U. Warring. Direct read confirms U. Warring
      is NOT on this paper. The actual authors are Hemmerling, Gebert,
      Wan, Nigg, Sherstov, and Schmidt (PTB Braunschweig + Hannover +
      Innsbruck). Provenance for the speculative co-authorship claim
      is unclear; possibly conflated with a different Schmidt-group
      paper.
    resolution: >
      Notes.md and extracted.yaml in this folder reflect the corrected
      author list. The scaffold's "co-authored by Steward" note in
      notes.md was removed.
    informs_dossier_entries:
      - "KD-UV280-001"
      - "KD-UV280-005"

  - id: "uv_surface_damage_at_30_60Wcm2"
    summary: >
      The CW UV-induced surface damage observed in Hemmerling2011 occurs
      on UV-grade fused silica AOM-crystal surfaces and / or right-angle
      prism cathetus and dielectric mirror surfaces at intensities
      32-64 W/cm^2 over timescales of a few hours. This is a
      Friedenauer-class architecture (1118 -> 559 -> 280 nm), and the
      damaged components are auxiliary optics outside the SHG cavities.
    resolution: >
      Direct Section C contribution for KD-UV280-008 and -012: design
      cavities and beam paths to avoid focused spots near reflecting
      / transmitting optical surfaces. Cite explicitly with the
      adjacent-wavelength caveat - Hemmerling2011 IS at 280 nm, so
      the wavelength caveat does NOT apply here. This is one of the
      cleanest 280 nm-specific data points available.
    informs_dossier_entries:
      - "KD-UV280-008"
      - "KD-UV280-012"
