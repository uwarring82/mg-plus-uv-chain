cross_check_notes:
  - id: "wavelength_adjacent_to_280nm"
    summary: >
      The headline result is at 266 nm, not 280 nm. The paper does not
      and cannot establish a 280 nm CW LIDT or operational-lifetime
      number on its own. Any port of these numbers into KD-UV280-005
      Section C must (i) state the search-boundary clause specified by
      the task-E logbook acceptance criteria and (ii) include an
      explicit phase-matching-angle and d_eff conversion from the Sony
      47.5 deg Type-I 532->266 geometry to the Friedenauer-class
      559->280 Type-I geometry.
    informs_dossier_entries:
      - "KD-UV280-005"
      - "KD-UV280-009"

  - id: "kondo_kubota_overlap"
    summary: >
      Authorship overlap with Kubota1998 (Kondo, Oka, Wada, Fukui, Umezu,
      Tatsuki, Kubota all appear in both author lists) suggests this
      Letter and the OSA Trends conference paper report the same
      experimental programme at the Sony Research Center. The 'three
      times in different samples' claim in this Letter and the 'three
      Cz-grown BBO samples' claim in Kubota1998 may refer to the same
      sample set; that overlap should be resolved when Kubota1998 is
      extracted before either is used as an independent Section C
      anchor.
    informs_dossier_entries:
      - "KD-UV280-005"
