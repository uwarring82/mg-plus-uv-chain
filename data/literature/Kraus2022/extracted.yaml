open_extraction_items:
  - "Run full extraction. Highest-priority numerical targets: fibre-laser model and power at 1069.6 nm; PPLN waveguide specs (HC Photonics, 10.3 mm, intrinsic 125 %/W, 45 deg C) and 534.8 nm output; DKDP crystal specs (50 mm, non-critical Type-I, ~100 deg C, d_eff 0.43 pm/V, 3.2 K cm tuning bandwidth, 32 um focus waist, 0.15 %/W calculated single-pass conversion); 267.4 nm UV output power (>50 uW from the abstract); phase-stability characterisation (<5e-17 at 1 s beat-note, 1e-18 electronics-limited)."
  - "Decide how the DKDP non-critical Type-I route at 267.4 nm maps onto KD-UV280-006 (alternative crystal at 280 nm). DKDP is hygroscopic and has lower d_eff than BBO; the trade-off is no walk-off and no cavity required. Frame as an architectural-alternative datapoint, not an in-class BBO comparison."
  - "Cross-check whether the DKDP non-critical Type-I phase-matching temperature scales smoothly from 534.8 nm to ~559 nm (Friedenauer-class fundamental); if so, the 280 nm DKDP analogue is worth a scaffold entry under KD-UV280-006 as an alternative-crystal candidate."
  - "Cross-reference to alternative-topology slate: logbook/2026-05-08-ic-vecsel-alternative-topology.md and logbook/2026-05-08-pulsed-raman-alternative-topology.md. DKDP single-pass is structurally distinct from both the IC-VECSEL and pulsed-Raman alternative topologies, and could either complement them (as a low-power, high-phase-stability probe-laser route) or stand on its own as a fourth alternative."

