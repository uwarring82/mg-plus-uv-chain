cross_check_notes:
  - id: "next_first_in_house_burd_class_linewidth"
    summary: >
      The neXt VECSEL is the first AG Schaetz in-house build that brings
      the 1118 nm in-house VECSEL into Burd2023-class linewidth
      performance. Wavemeter-locked Allan deviation 101(8) kHz at short
      timescales matches Burd2023's < 100 kHz at 940 nm and is well
      within the 'target <= 100 kHz' operating budget set in the
      seed-laser components page (docs/components/seed-lasers.md). The
      seed-laser linewidth budget direction (steward direction,
      2026-05-08) is therefore experimentally underwritten by an
      in-house, wavelength-matched, 25Mg+-targeted system - not only
      by the Burd2016 / Burd2023 design-principles literature.
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "passive_thermal_management_works"
    summary: >
      Removing the water-cooling loop (the headline change between Nr.4
      and neXt) does not increase short-term frequency variance and
      reduces volume by ~ 16x. The Spanke2023 lesson - that further
      refinement of active water cooling has diminishing returns - is
      validated by the neXt system's superior stability without water
      cooling. For mg-plus-uv-chain build planning, this means a
      VECSEL seed laser does not require the per-laser closed-loop
      water plumbing of the previous-generation Friedenauer or
      Kiefer2020-era systems; passive radiation through an aluminium
      housing + Peltier on the gain chip is sufficient. Material
      consequence: rack-space requirements drop, infrastructure
      overhead drops, and the 'compact, semiconductor-bandwidth-defined
      cavity' Sail principle from Burd2023 is reified.
    informs_dossier_entries:
      - "KD-UV280-015"
  - id: "raspberry_pi_controller_replaces_arroyo"
    summary: >
      The Raspberry-Pi-based custom controller delivers TEC Allan
      deviation 0.08 mK on long timescales (better than Arroyo
      manufacturer spec of < 4 mK/h) at < EUR 500 cost vs the
      ~ EUR 2000-4000 per-channel Arroyo TECSource it replaces. This is
      a ~ 10x cost reduction for the temperature-control infrastructure
      of the seed-laser layer. Operationally, it also adds compute and
      sensor I/O to the controller - the architecture suits future
      automation (e.g. real-time loss monitoring on the SHG cavities
      via ADC channels). For mg-plus-uv-chain build planning, this is
      the operational evidence that the seed-laser layer is becoming
      cheaper as well as narrower-linewidth.
    informs_dossier_entries:
      - "KD-UV280-015"
