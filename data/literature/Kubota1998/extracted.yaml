    value_text: "Czochralski-grown beta-BaB2O4 from pure BBO melt"
    units: null
    location_in_paper: "Introduction (p. 79); Fig. 1"
    notes: "Sony in-house Czochralski (Cz) growth from pure BBO melt, building on Itoh et al. 1990 (ref [4]). Distinct from the more common flux-grown BBO. The HeNe laser tomographic test shows much lower point-defect density than typical flux-grown samples."

