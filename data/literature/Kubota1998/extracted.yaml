open_extraction_items:
  - "Sample-to-sample sample-(a) vs sample-(b) variation in C1 (factor of ~2) suggests scattering-centre-density variation across the Sony Cz-BBO inventory; vendor / batch / boule-region metadata for the three CW samples and the two pulsed samples is not given. The hypothetical mapping to Crystals of Siberia / CASTECH / EKSMA / FEEFO BBO is therefore unconstrained by Kubota1998."
  - "K1 = 7 MV/m and K2 = 50 KV/mm are reported with their power-density equivalents (11 MW/cm^2 and 550 W/cm^2); but the sample-to-sample variation of K1 (constant across two samples) and K2 (single typical sample) is not characterised."
  - "Phase-matching-angle (47.9 deg) is given for 532 -> 266 nm, NOT 559 -> 280 nm. Conversion to the Friedenauer-class geometry must come from KD-UV280-005 Section C / Sellmeier (Tamosauskas2018 or Kato1990)."
  - "Decision required: in Section C, do we credit Kondo1998 + Kubota1998 as one programme (preferred, given the overlap) or two? If one, the 'three samples' reproducibility statement must be cited from Kubota1998 (more detailed) and the headline runtime number from Kondo1998 (more directly stated)."

extraction_passes:
  - date: "2026-05-06"
    by: "assistant under steward direction"
    scope: >
      Initial full-body extraction from the user-provided scanned PDF.
      Covers Cz-BBO crystal characterisation (boule, polish, linear
      absorption, scattering, two-photon absorption, thermal
      conductivity), the CW-266 nm cavity reliability test (geometry,
      cavity reflectance, intracavity power, single-pass conversion,
      round-trip loss decomposition, degradation rate vs UV power
      density, lifetime extrapolation), the pulsed-266 nm test
      (repetition rate, pulse duration, average / peak powers, conversion
      efficiency, single-pulse damage probability), the empirical
      p(E) = C exp(-K/E) damage-probability model with separate CW and
      pulsed parameter sets, the C2/C1 ~ 1e-6 thermal -> multiphoton
      transition argument, and the post-pulsed microdefect-localisation
      evidence. Status promoted from SCAFFOLD to DRAFT.
    status: "DRAFT"

cross_check_notes:
  - id: "kondo_kubota_overlap"
    summary: >
      Authorship overlap (Kondo, Oka, Wada, Fukui, Umezu, Tatsuki, Kubota
      all in both author lists), same Sony Research Center affiliation,
      identical CW operating point (532 -> 266 nm SHG, 100 mW UV from
      500 mW green, w0 = 46 um, three samples, 1000+ h, 0.4 L/min N2
      purge), identical d_eff = 1.64 pm/V, identical gamma_SH = 5e-5
      W^-1, and identical degradation-rate scaling all confirm Kondo1998
      and Kubota1998 are the same Sony experimental programme reported
      in two venues. The proceedings paper (Kubota1998) is the more
      comprehensive document and adds the crystal characterisation, the
      pulsed result, and the unified damage-probability model.
    resolution: >
      For dossier Section C use, treat Kondo1998 + Kubota1998 as one
      programme citation, not two independent measurements. Anchor
      runtime / qualitative claims to the journal article (Kondo1998);
      anchor numerical mechanism / damage-probability claims to the
      proceedings paper (Kubota1998).
    informs_dossier_entries:
      - "KD-UV280-005"
      - "KD-UV280-011"

  - id: "phase_match_vs_cut_angle"
    summary: >
      The Sector-C boule was cut at 47.5 deg to the c-axis. The
      Sellmeier-predicted Type-I 532 -> 266 nm phase-matching angle in
      Cz-BBO at the operating temperature is 47.9 deg. The 0.4 deg
      offset is the small detuning the authors operate at; this is
      consistent with Kondo1998's 47.5 deg cut-angle quote and
      Kondo1998's 4.88 deg walk-off-angle quote.
    resolution: >
      No discrepancy. Cut and phase-matching angles are different
      quantities, and the 0.4 deg offset is the experimental phase-
      matching-tuning margin.
    informs_dossier_entries:
      - "KD-UV280-005"

  - id: "walk_off_parameter_convention_difference"
    summary: >
      Kondo1998 reports B = 14.67 with B = rho * sqrt(k * l) / 2.
      Kubota1998 reports beta = 37.9 for the same physical setup. The
      values are not numerically consistent under the Kondo definition;
      the difference is a Boyd-Kleinman walk-off-parameter convention
      difference between the two papers. The downstream single-pass
      conversion factor gamma_SH = 5e-5 W^-1 agrees, so the underlying
      physics is consistent.
    resolution: >
      Record both as-stated. Do not derive one from the other. When
      reproducing the result in src.shg.bk_efficiency, pick a single
      convention and apply it consistently; the gamma_SH value is the
      cross-check anchor.
    informs_dossier_entries:
      - "KD-UV280-005"
      - "KD-UV280-013"

  - id: "uv_drives_failure_not_green"
    summary: >
      Fig. 5 (HeNe tomographic image after pulsed 266 nm operation)
      shows defect formation along the *generated UV* propagation
      direction, not along the *input 532 nm* direction. The authors
      conclude damage is induced primarily by the 266 nm UV, ruling
      out the green pump as the dominant degradation actor.
    resolution: >
      This is the cleanest single-paragraph published evidence that
