cross_check_notes:
  - id: "predates_Friedenauer2006"
    summary: >
      The dye-laser + BBO architecture in Kjaergaard2000 (year 2000)
      predates the Yb-fiber + LBO + BBO architecture of Friedenauer
      2006. Both produce CW UV at 280-285 nm via BBO SHG; the
      fundamental sources differ.
    resolution: >
      Cite Kjaergaard2000 as prior-art evidence in KD-UV280-001 for
      the broader architecture-family question (BBO-SHG-to-280-nm has
      been operational since at least 2000). Do not cite as primary
      evidence for KD-UV280-005 / -009 / -011 / -012 numerical content
      since no operating-lifetime, damage-threshold, or mechanism
      observations are reported in this paper.
    informs_dossier_entries:
      - "KD-UV280-001"
