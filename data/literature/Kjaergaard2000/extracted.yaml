parameters:
  - symbol: "ionization_architecture_route"
    value_text: "Single-mode tunable ring CW dye laser (Pyrromethene 556) pumped by Ar+ laser -> SHG in 5 mm BBO crystal in external bow-tie cavity -> 285 nm UV for two-photon ionization of Mg (or 272 nm for Ca, or 280 nm for 24Mg+ Doppler cooling)"
    units: null
    location_in_paper: "Section 1"
    notes: "Pre-Yb-fiber-laser generation of CW UV at 280-285 nm by dye-laser SHG. Same architecture used (with different fundamental wavelengths) for both ionization and cooling lasers in the Mg system. Frequency-doubling unit was originally designed for 560 nm operation but is sufficiently versatile for the wavelengths needed for both Mg and Ca ionization."

  - symbol: "lambda_Mg_ionization"
    value: 285e-9
    units: "m"
    location_in_paper: "Section 1; Fig. 1"
    notes: "Two-photon ionization wavelength for Mg via 3s 3p 1P1 intermediate state. Used in the experiment described in this paper."

  - symbol: "lambda_Mg_cooling"
    value: 280e-9
    units: "m"
    location_in_paper: "Section 1"
    notes: "Doppler cooling wavelength for 24Mg+ on the 3s 2S1/2 -> 3p 2P3/2 transition. The cooling laser system is described in §1 as 'almost identical' to the ionization laser system."

  - symbol: "BBO_crystal_length"
    value: 5e-3
    units: "m"
    location_in_paper: "Section 1"
    notes: "5-mm-long BBO crystal used in the external bow-tie cavity for SHG. The same crystal is used for both Mg ionization (570 nm -> 285 nm) and Mg+ cooling (560 nm -> 280 nm) in the dye-laser architecture."

  - symbol: "P_UV_ionization"
    value: 2e-3
    units: "W"
    location_in_paper: "Section 2"
    notes: "Total UV power ~2 mW used for the Mg ionization experiment. Focused to a ~0.3 mm diameter spot, giving an operating intensity of ~28 mW/cm^2 -- well below the Hemmerling2011 surface-damage threshold of 32-64 W/cm^2."

  - symbol: "ionization_focused_spot_diameter"
    value: 0.3e-3
    units: "m"
    location_in_paper: "Section 2"
    notes: "Focused spot diameter of the ionization laser at the trap centre."

  - symbol: "ionization_loading_time_typical"
    value: 20
    units: "s"
    location_in_paper: "Section 2; Fig. 4 caption"
    notes: "Typical 20-second trap loading time for ~3500 24Mg+ ions at the maximum production rate (zero relative detuning of the ionization laser)."

  - symbol: "lambda_Ca_ionization"
    value: 272e-9
    units: "m"
    location_in_paper: "Section 1; Fig. 1"
    notes: "Two-photon ionization wavelength for 40Ca via 4s 5p 1P1 intermediate state."

  - symbol: "lambda_Ca_cooling"
    value: 397e-9
    units: "m"
    location_in_paper: "Section 1"
    notes: "Doppler cooling wavelength for 40Ca+ on the 4s 2S1/2 -> 4p 2P1/2 transition. Generated by Ti:sapphire laser frequency-doubled in 12-mm LBO crystal external bow-tie cavity."

  - symbol: "isotope_shift_24Mg_to_25Mg"
    value: 0.73e9
    units: "Hz"
    location_in_paper: "Section 2"
    notes: "Isotope shift of the 3s2 1S0 -> 3s 3p 1P1 transition (285 nm) between 24Mg and 25Mg. Used as a control parameter for isotope-selective loading."

  - symbol: "isotope_shift_24Mg_to_26Mg"
    value: 1.41e9
    units: "Hz"
    location_in_paper: "Section 2"
    notes: "Isotope shift between 24Mg and 26Mg."

  - symbol: "atomic_beam_Doppler_broadening"
    value: 800e6
    units: "Hz"
    location_in_paper: "Section 2"
    notes: "Doppler broadening of the 285 nm transition resonance, from a 30 mrad atomic-beam divergence. Larger than the natural 80 MHz line width and the 25Mg hyperfine splitting; sets the achievable isotope-selectivity contrast."

  - symbol: "trap_RF_frequency"
    value: 5.1e6
    units: "Hz"
    location_in_paper: "Section 1"
    notes: "Linear Paul trap RF drive frequency."

  - symbol: "trap_RF_voltage_amplitude_range"
    value: [30, 80]
    units: "V"
    location_in_paper: "Section 1"
    notes: "Typical RF amplitude range used in the trap."

open_extraction_items:
  - "The paper does not give an operational lifetime number for the BBO cavity itself. The Aarhus / Drewsen group institutional record on this dye-laser + BBO architecture might contain such information; if pursued, this is a [I]-tier source worth scouting."
  - "The 5 mm BBO crystal is described in §1 but vendor / cut angle / coating details are not given. If the steward wants to add this datapoint to the KD-UV280-005 vendor-comparison record, contact the corresponding author or check the Drewsen-group thesis archive."

