cross_check_notes:
  - id: "d_eff_eckardt1990_vs_eimerl1987"
    summary: >
      Eckardt et al. 1990 [P:Eckardt1990] re-measure |d_22(BaB2O4)| =
      2.2 +/- 0.22 pm/V (10% absolute accuracy; 4% reproducibility across
      12 measurements on three samples), 37% higher than Eimerl 1987's
      |d_11| = 1.6 +/- 0.4 pm/V. The two papers' d_22 (Eckardt) and d_11
      (Eimerl) refer to the *same physical R3c tensor element*; the
      naming difference is a choice of which crystallographic axis is
      called 'x' (Eckardt's d_eff formula uses sin(3 phi) where Eimerl's
      uses cos(3 phi); both quote optimum azimuth |sin(3 phi)| = 1 or
      |cos(3 phi)| = 1 respectively).
    candidate_explanations:
      - "Different d_36(KDP) calibration: Eimerl uses 0.39 pm/V, Eckardt measures 0.38 pm/V. Both authors note this difference is small (2.6%) compared with the 37% revision; cannot be the dominant cause."
      - "Different sample mix: Eimerl used the Fujian crystal exclusively; Eckardt used two Stanford-grown samples plus the same Fujian crystal. The Eckardt 4% reproducibility across the three-sample set rules out vendor sensitivity as the dominant cause."
      - "Different spatial-mode characterisation: Eimerl reports the largest single source of error as 'fluctuation in spatial distribution caused by drifting of spatial filter alignment'. Eckardt invested in injection-seeding and 100-shot averaging that probably tightens this term substantially."
      - "Modern walk-off correction: Eckardt's d_eff formula uses (theta + rho) where Eimerl's uses theta. This propagates into the d_eff *extraction from the measured SHG signal*, not into the reported tensor component, but small differences in implementation could account for a few percent."
    resolution: >
      Eckardt 1990 is the modern absolute-d_eff anchor for BBO and is
      the value that downstream tooling (SNLO, Nikogosyan 2005 compendium,
      modern Friedenauer-class designs) inherits. KD-UV280-005 Section C
      and the §5 Phase 1 evidence-table BBO row both cite Eckardt as the
      central value with Eimerl recorded as the historical lower-bound
      result. The conversion-efficiency-at-fixed-intensity ratio is
      (2.2/1.6)^2 cos^2(theta+rho)/cos^2(theta) ~ 1.59, consistent with
      the ~ 50% conversion efficiencies achieved in modern Friedenauer-
      class systems at the LBO stage.
    informs_dossier_entries:
      - "KD-UV280-005"

  - id: "sellmeier_tamosauskas2018_vs_eimerl1987"
    summary: >
      Tamosauskas et al. 2018 [P:Tamosauskas2018] refined three-oscillator
      Sellmeier (Eq. 1, valid 0.188 - 5.2 um) gives n_o, n_e values
      ~ 8e-4 lower than Eimerl 1987 Table I direct prism measurements at
      visible wavelengths (1014, 589, 546, 405 nm spot-checked; uniform
      offset). At 280 nm the offset narrows to 1e-4 (n_o) and 1.2e-3 (n_e).
      Tamosauskas reports their fit matches the Chen 2012 book Table direct
      measurements to 4e-5, which means the discrepancy is between the
      Eimerl 1987 anchor measurements and the Chen 2012 anchor measurements
      themselves, not in the Tamosauskas fit.
    candidate_explanations:
      - "Different prism samples / different polishing eras (1987 vs 2012). Optical-quality differences at the 1e-3 level are plausible."
      - "Different wavelength-calibration standards used in the two prism-spectrometer measurements."
      - "Crystal-vendor differences: Eimerl used Fujian crystals (1980s growth); the Chen 2012 book Table data may reflect more recent growth methods."
    resolution: >
      For the operationally relevant derived quantities (theta_PM, walk-off
      rho), the two Sellmeier sets agree within 0.1 deg / 1 mrad despite
      the 1e-3 absolute-index disagreement. The Type-I PM condition
      n_e(2 omega, theta) = n_o(omega) cancels most of the offset because
      both polarisations move in the same direction. KD-UV280-005 Section C
      cites both [P:Eimerl1987] and [P:Tamosauskas2018] as parallel
      Sellmeier anchors without privileging one over the other; downstream
      ABCD or Fresnel calculations that need absolute indices should use
      both as sensitivity bounds.
    informs_dossier_entries:
      - "KD-UV280-005"
