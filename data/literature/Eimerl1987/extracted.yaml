      Full extraction from the PDF (provided in-conversation 2026-05-04 by
      the steward; not committed to repository per AIP/J. Appl. Phys. 1987
      copyright). Promotes status SCAFFOLD -> DRAFT. Captured: crystal
      structure (R3c) and lattice constants; full Table I direct refractive
      indices (13 wavelengths, 405-1014 nm); the Eimerl 1987 'this work'
      Sellmeier coefficients for n_o and n_e plus the Chen 1985 (deprecated
      per Table VI) and Kato 1986 alternative sets; the Nd:YAG harmonics
      indices (Table III); thermo-optic coefficients (Eq. 2-3, Table IV);
      transparency window 200-3000 nm with the 215 nm UV onset; the 1064-nm
      / 1-ns one-on-one bulk damage threshold (13.5 J/cm^2); the d_11 =
      1.6 +/- 0.4 pm/V nonlinear coefficient with the |d_22/d_11| and
