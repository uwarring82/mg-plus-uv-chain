    status: "DRAFT"

cross_check_notes:
  - id: "wavelength_266nm_not_280nm"
    summary: >
      The result is at 266 nm, not 280 nm. Same caveat as Kondo1998 /
      Kubota1998 / Burkley2021 (244 nm). The TPA temperature scaling
      and the colour-centre density-reduction observations are
      mechanism-level results that are wavelength-scalable in
      functional form, but the absolute coefficients (3.9 cm/GW at
      266 nm, 22 deg C) depend on the wavelength-dependent BBO
      transparency edge and the specific defect-state spectroscopy.
    resolution: >
      Adjacent-wavelength caveat applies. KD-UV280-009 / -011
      Section C should cite Kumar2015 for the temperature-mitigation
      lever and the asymmetric heating observation, with explicit
      search-boundary clause from the task-E logbook acceptance
      criteria.
    informs_dossier_entries:
      - "KD-UV280-009"
      - "KD-UV280-011"

  - id: "quasi_CW_regime_thermally"
    summary: >
      The 80 MHz / 20 ps regime has 12.5 ns inter-pulse interval and
      53 us thermal relaxation time, so each BBO crystal element
      experiences the time-averaged thermal load of the pulse train,
      not the per-pulse thermal kick. Thermal effects (Sec. 6
      observations) are at the average-power level. The peak intensity
      (45.7 MW/cm^2 max) is a different quantity relevant to TPA /
      colour-centre formation.
    resolution: >
      For KD-UV280-005 thermal-load mapping, use the average UV power
      / beam area at the BBO exit face. For KD-UV280-011 mechanism
      mapping, use the peak intensity / TPA model.
    informs_dossier_entries:
      - "KD-UV280-005"
      - "KD-UV280-011"

  - id: "uv_drives_heating_not_green"
    summary: >
      Decoupled measurements show that, at the operating point, UV-only
      heating is larger than green-only heating (1.3 K rise vs 0.3 K
      rise per W of generated UV vs incident green). The combined
      heating (with phase-matching satisfied and harmonic generation
      occurring) is much larger than the sum of the individual
      contributions. Cross-check with Kubota1998's HeNe tomographic
      image (defect formation along the UV propagation direction):
      both papers identify UV as the dominant degradation actor.
    resolution: >
      Direct mechanism evidence for KD-UV280-011 Section C. The dossier
      should cite both Kubota1998 (HeNe defect-localisation image) and
      Kumar2015 (decoupled green-only / UV-only thermal measurement)
      as the empirical basis for the UV-driven-failure mechanism.
    informs_dossier_entries:
      - "KD-UV280-011"
