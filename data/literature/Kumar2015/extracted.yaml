    by: "assistant under steward direction"
    scope: >
      Initial full-body extraction from the open-access UPCommons PDF
      (13 pages). Sections covered: full architecture chain, LBO and
      BBO crystal specifications, single-crystal and walk-off-
      compensated power scaling, angular- and temperature-acceptance
