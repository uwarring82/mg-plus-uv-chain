cross_check_notes:
  - id: "secondary_source_section_C_rule"
    summary: >
      Turcicova2022 is a review (source_tier: S). The dossier's Section C
      rule requires at least one peer-reviewed primary [P] source per
      constraint. Turcicova2022 cannot be the sole citation for any
      KD-UV280-005 / -006 / -008 / -009 / -011 / -012 Section C
      constraint; it must accompany a primary anchor.
    informs_dossier_entries:
      - "KD-UV280-005"
      - "KD-UV280-006"
      - "KD-UV280-008"
      - "KD-UV280-009"
      - "KD-UV280-011"
      - "KD-UV280-012"

  - id: "vendor_catalogue_LIDT_caveat"
    summary: >
      Section 5 conclusion explicitly states 'It is unclear whether or
      not the producers always present their own measured LIDT values
      or if they simply take those over from other producers.' The
      compendium of 55 BBO data points and the corresponding CLBO
      compendium include vendor-catalogue values from Altechna,
      Bluebean Optical, CASTECH, Edmund Optics, MTOptics, Raicol,
      United Crystals (BBO) and CASTECH, GWU-Lasertechnik, Laser
      Crylink, OXIDE Corporation (CLBO). These values should be
      treated as [V] (vendor) tier or as upper bounds, never as the
      sole anchor for a Section C constraint.
    informs_dossier_entries:
      - "KD-UV280-005"
      - "KD-UV280-006"

  - id: "no_280nm_CW_lifetime_in_review"
    summary: >
      Turcicova2022 reinforces the negative result from the task-E
      scout passes: there is no peer-reviewed BBO-at-280-nm CW
      operational-lifetime measurement in the published LIDT review
      literature. The Fig. 1b CW data point is at 266 nm (per the
      Nikogosyan compendium chain), not 280 nm. The dossier Section C
      acceptance criterion requiring an explicit search-boundary
      statement when adjacent-wavelength evidence stands in for direct
      280 nm data still applies.
    informs_dossier_entries:
      - "KD-UV280-005"
