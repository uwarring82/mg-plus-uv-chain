  - "Promote Kumar2015 to its own data/literature/Kumar2015/ folder. PDF retrieved (downloads/literature/task-e/Kumar2015_UPCommons_open.pdf). The +200 deg C TPA reduction and the 69 % colour-centre-density reduction are directly transferable to KD-UV280-009 thermal-mitigation strategy."
  - "Decide whether to extract Yoshida2006 (ref [19]). It is the source of the BBO-vs-CLBO 20 % LIDT difference and the BBO {001}-vs-{100} 2x anisotropy at 1064 nm. The wavelength-anisotropy result does not generalise to 280 nm without a separate measurement; if the steward chooses not to extract, log this as a deferred Section C TODO."
  - "Decide whether to extract Manenkov2014 (ref [52]). Canonical theoretical review of laser-induced-damage mechanisms; useful as the [S]-tier theory anchor for KD-UV280-011. Pure literature review, no numerical extraction needed beyond the mechanism vocabulary already captured in notes.md."
  - "Verify ref [27] is Kumar2015 (DOI 10.1364/OE.23.028091): Turcicova2022 cites it as 'High-power, high-repetition-rate performance characteristics of beta-BaB2O4 for single-pass picosecond ultraviolet generation at 266 nm'. Match against the downloaded PDF."

