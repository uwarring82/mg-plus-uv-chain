  - symbol: "ranking_by_carbon_contamination_LIDT"
    value_text: "silica > alumina > hafnia > tantala > niobia > titania, in order of increasing LIDT under carbon contamination at 1070 nm CW"
    units: null
    location_in_paper: "Discussion; Fig. 4"
    notes: "Material-selection ranking that follows from the bandgap-LIDT scaling. Strong implication for cavity-mirror / AR-coating choice in the Friedenauer-class architecture: prefer surfaces of silica or alumina; use hafnia only when refractive-index considerations require it."

