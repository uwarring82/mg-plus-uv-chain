parameters:
  - symbol: "test_laser_wavelength"
    value: 1070e-9
    units: "m"
    location_in_paper: "Materials and Methods"
    notes: "IPG YLS-17000 ytterbium-doped fiber laser CW at 1070 nm. The wavelength is set by the fiber-laser tooling, not by an experimental design choice; it is far from the 280 nm dossier target. The mechanism extracted from this paper is wavelength-scalable in functional form, not in absolute thresholds."

  - symbol: "test_laser_power_max"
    value: 17e3
    units: "W"
    location_in_paper: "Materials and Methods"
    notes: "Continuous-wave 17 kW maximum power at 1070 nm. Used to access several MW/cm^2 irradiance with mm-scale spot sizes, large enough to average over typical defect / contamination densities."

  - symbol: "test_spot_size_primary"
    value: 1e-3
    units: "m"
    location_in_paper: "Materials and Methods"
    notes: "1 mm primary spot size; up to 3 MW/cm^2 irradiance accessible. Reduced to 400 um for tests on the highest-bandgap films (silica) which required higher irradiances."

  - symbol: "test_grid_spacing"
    value: 4e-3
    units: "m"
    location_in_paper: "Materials and Methods; Fig. 2"
    notes: "3x3 site grid with 4 mm spacing on each test sample. Spacing chosen to prevent any influence from previously exposed adjacent sites."

  - symbol: "contaminant_carbon_diameter"
    value: 7e-6
    units: "m"
    location_in_paper: "Materials and Methods"
    notes: "Carbon microparticle average diameter 7 um; very high optical opacity. Suspended in isopropyl alcohol at 0.07 g/mL; 0.15 mL drop placed on optic, settled, and dried under N2 flow."

  - symbol: "contaminant_steel_diameter_range"
    value: [35e-6, 40e-6]
    units: "m"
    location_in_paper: "Materials and Methods"
    notes: "Stainless steel microparticle 35 to 40 um diameter; metallic particles frequently encountered during assembly of optical systems."

  - symbol: "contamination_absorption_typical"
    value: 20000
    units: "ppm"
    location_in_paper: "Fig. 1; Materials and Methods"
    notes: "Typical PCI-measured absorption of carbon-contaminated samples: thousands to tens of thousands of ppm; average value used in the model is 20000 ppm."

  - symbol: "DBR_titania_silica_carbon_LIDT_lowest_damaging"
    value: 17e6
    units: "W/m^2"
    location_in_paper: "Results; Fig. 3"
    notes: "Lowest damaging irradiance for carbon-contaminated titania-silica DBR: 17 kW/cm^2."

  - symbol: "DBR_niobia_silica_carbon_LIDT_lowest_damaging"
    value: 28e6
    units: "W/m^2"
    location_in_paper: "Table 1; Fig. 3"
    notes: "Lowest damaging irradiance for carbon-contaminated niobia-silica DBR: 28 kW/cm^2."

  - symbol: "DBR_tantala_silica_carbon_LIDT_lowest_damaging"
    value: 53e6
    units: "W/m^2"
    location_in_paper: "Table 1; Fig. 3"
    notes: "Lowest damaging irradiance for carbon-contaminated tantala-silica DBR: 53 kW/cm^2."

  - symbol: "DBR_hafnia_silica_carbon_LIDT_lowest_damaging"
    value: 2.25e9
    units: "W/m^2"
    location_in_paper: "Results; Fig. 3"
    notes: "Lowest damaging irradiance for carbon-contaminated hafnia-silica DBR: 2.25 MW/cm^2. Significantly higher than the lower-bandgap DBRs."

  - symbol: "halfwave_titania_carbon_LIDT_lowest_damaging"
    value: 105e6
    units: "W/m^2"
    location_in_paper: "Results; Fig. 4"
    notes: "Lowest damaging irradiance for carbon-contaminated titania halfwave (lambda/2) coating: 105 kW/cm^2."

  - symbol: "halfwave_silica_carbon_LIDT_max_tested_no_damage"
    comparator: ">"
    value: 17.8e9
    units: "W/m^2"
    location_in_paper: "Results; Fig. 4"
    notes: "Carbon-contaminated silica halfwave coating did NOT damage at the highest tested irradiance of 17.8 MW/cm^2. Silica is the highest-bandgap film tested (Eg = 9 eV). Max-tested-irradiance is a lower bound on the silica LIDT under these conditions, not a measurement."

  - symbol: "pristine_silica_at_1070nm_max_tested_no_damage"
    comparator: ">"
    value: 13e9
    units: "W/m^2"
    location_in_paper: "Table 1; Results"
    notes: "Pristine silica halfwave coating did not damage at 13 MW/cm^2 of 1070 nm illumination during the IR + UV control experiment."

  - symbol: "pristine_silica_at_224nm_max_tested_no_damage"
    comparator: ">"
    value: 50e6
    units: "W/m^2"
    location_in_paper: "Materials and Methods; Results"
    notes: "Pristine silica halfwave coating exposed to 40 mW of 224 nm DUV light focused to <5 um spot, equivalent to >50 kW/cm^2 irradiance; no damage observed. Used as control for the IR + UV co-illumination experiment. NOT a UV LIDT measurement; only an upper bound on UV-photo-excitation contribution to the contamination-driven damage process."

  - symbol: "IR_plus_UV_co_illumination_damage"
    value_text: "no damage observed at any IR + UV combination tested up to 13 MW/cm^2 IR + >50 kW/cm^2 UV on pristine silica halfwave coatings. Carbon-contaminated coatings still failed at 17 to 53 kW/cm^2 IR alone."
    units: null
    location_in_paper: "Results; Table 1"
    notes: "Effectively rules out UV photo-excitation as the dominant damage mechanism for the 1070 nm contaminated-optic damage. Functional damage process is thermally driven free-carrier generation from contaminant heating."

  - symbol: "capping_layer_ineffectiveness"
    value_text: "Silica capping layers of thickness 1 to 5.5 um deposited over tantala-silica DBRs gave NO appreciable increase in carbon-contaminated damage threshold (Fig. 5)."
    units: null
    location_in_paper: "Results; Fig. 5"
    notes: "The thermal-diffusion model (Sec. Thermally Generated Free Carrier Model) explains this: heat from the heated contaminant diffuses through 1 to 5 um of silica in <1 ms, but the contaminant takes ~1 ms to fully evaporate. Effective capping requires mm-thick layers, demonstrated by backside contamination of bare silica substrates that survive at the highest tested powers."

  - symbol: "TCC_carbon_particle_to_film"
    value: 48e3
    units: "W/m^2/K"
    location_in_paper: "Thermally Generated Free Carrier Model"
    notes: "Thermal contact conductance between 7 um carbon particle and oxide-coated film, fit to experimental data. Independent measurements (Wolff and Schneider 1998, ref [14]) on 1 um graphite flakes give 46 kW/m^2/K. Bracketed by graphene / metal-metal contact (~few MW/m^2/K) and clean-metal-metal mechanical contact (~few kW/m^2/K)."

  - symbol: "particle_evaporation_T"
    value: 4000
    units: "K"
    location_in_paper: "Thermally Generated Free Carrier Model"
    notes: "Carbon-particle sublimation temperature used in the heat-transport simulation. Particle assumed to stabilise at this temperature once laser-induced heating exceeds the threshold for sublimation."

  - symbol: "free_carrier_density_formula"
    value_text: "N = sqrt(N_c * N_v) * exp(-E_g / (2 * k_B * T))"
    units: null
    location_in_paper: "Thermally Generated Free Carrier Model; Eq. 3"
    notes: "Maxwell-Boltzmann free-carrier density vs film bandgap E_g and temperature T. Sets the bandgap-dependent runaway threshold. N_c, N_v are conduction- and valence-band effective densities of states (taken from amorphous SiO2 throughout for lack of data on other oxides)."

  - symbol: "free_carrier_absorption_formula"
    value_text: "alpha_FC = N * e^2 / (m_eff * eps_0 * n * c * tau) * 1 / omega^2"
    units: null
    location_in_paper: "Thermally Generated Free Carrier Model; Eq. 2"
    notes: "Drude-Lorentz free-carrier absorption coefficient. m_eff is the effective electron mass (taken as the free-space electron mass for amorphous oxide films), tau is the phonon mean-free-path / sound-speed phonon lifetime, omega is the angular frequency. The 1 / omega^2 wavelength scaling means that, for the same N, alpha_FC is ~16x larger at 280 nm than at 1070 nm; the mechanism becomes more rather than less aggressive at deep-UV wavelengths."

  - symbol: "runaway_timescale_tantala_at_1p6MWcm2"
    value: 10e-6
    units: "s"
    location_in_paper: "Fig. 6b"
    notes: "Simulated runaway thermal timescale for tantala film at 1.6 MW/cm^2 (just above the carbon-contaminated tantala damage threshold)."

  - symbol: "runaway_timescale_hafnia_at_3p8MWcm2"
    value: 5e-6
    units: "s"
    location_in_paper: "Fig. 6b"
    notes: "Simulated runaway thermal timescale for hafnia film at 3.8 MW/cm^2 (just above the carbon-contaminated hafnia damage threshold)."

  - symbol: "runaway_timescale_alumina_at_6p3MWcm2"
