cross_check_notes:
  - id: "wavelength_1070nm_not_280nm"
    summary: >
      The damage testing is at 1070 nm CW, not 280 nm. The control
      experiment (40 mW 224 nm + 17 kW 1070 nm) showed no UV
      photo-excitation contribution under the test conditions. The
      mechanism the paper establishes is thermally driven free-carrier
      generation from contaminant heating, which is wavelength-scalable
      in functional form (Eq. 1-3 are bandgap-driven) but not in
      absolute thresholds (alpha_FC ~ 1 / omega^2; absorption of
      contaminants varies with wavelength).
    resolution: >
      Adjacent-wavelength caveat applies. KD-UV280-008 / -012
      Section C should cite Brown2019 for the bandgap-LIDT scaling
      argument and the capping-layer-ineffectiveness result, with
      explicit search-boundary clause from the task-E logbook
      acceptance criteria.
    informs_dossier_entries:
      - "KD-UV280-008"
      - "KD-UV280-012"

  - id: "free_carrier_absorption_wavelength_scaling"
    summary: >
      The Drude-Lorentz free-carrier absorption coefficient alpha_FC
      scales as 1 / omega^2. At 280 nm vs 1070 nm, alpha_FC is ~16x
      larger for the same free-carrier density N. This means the
      contamination-driven CW breakdown mechanism becomes MORE
      aggressive at deep-UV wavelengths, not less.
    resolution: >
      Important for KD-UV280-012: the cleanliness rationale developed
      in Brown2019 is even more important at 280 nm than at 1070 nm.
      The 1 / omega^2 scaling is only the absorption-coefficient piece;
      the carrier-generation piece (which is bandgap-driven and
      temperature-driven) is wavelength-independent except through
      the contaminant absorption itself.
    informs_dossier_entries:
      - "KD-UV280-012"
