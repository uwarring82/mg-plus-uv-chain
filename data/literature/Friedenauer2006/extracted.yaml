  - "BBO d_eff at 559 nm Type-I (for first-principles SHG efficiency recomputation) is not given by Friedenauer 2006 — must come from KD-UV280-005 Section C / SNLO."
  - "BBO walk-off angle rho at the 559->280 nm Type-I phase-matching angle is not given by Friedenauer 2006 — must come from KD-UV280-005 Section C / Sellmeier."
  - "Refractive indices n_LBO(1118) and n_BBO_o(559) are not given by Friedenauer 2006 — must come from KD-UV280-005 / -007 Section C / Sellmeier."

