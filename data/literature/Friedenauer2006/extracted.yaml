cross_check_notes:
  - id: "unlockable_domain_width_consistency"
    summary: >
      The reported domain width (1.4e10 Hz, i.e. 14 GHz) and the reported
      wavelength bounds (1118.339 nm to 1118.409 nm, Δλ = 70 pm) are not
      numerically consistent under the standard Δν = c·Δλ/λ² conversion at
      1118 nm: 70 pm at 1118 nm gives Δν ≈ 16.8 GHz, not 14 GHz. Confirmed
      by direct PDF read on 2026-05-04: the paper states verbatim "We
      discovered a 14-GHz-broad frequency region between 1118.409 nm and
      1118.339 nm" (§4). The discrepancy is intrinsic to Friedenauer 2006,
      not an extraction error.
    candidate_explanations:
      - "Paper quotes the 14 GHz width from a measurement at one optical stage and the wavelength bounds from a measurement at another (or different observers)."
      - "Paper reports a sub-domain of the 16.8 GHz wavelength range that was actually un-lockable (i.e. the lockable failure was localised within the 70 pm wavelength window, not coextensive with it)."
      - "Loose rounding on the part of the authors."
    resolution: >
      Discrepancy is in the source paper itself; KD-UV280-010 should cite
      both numbers separately and not derive one from the other. The
      candidate-explanations list above is for downstream interpretive
      use; the Charter §8.1 vocabulary inherits the paper's '14 GHz'
      figure as-stated.
    informs_dossier_entries:
      - "KD-UV280-010"
      - "KD-UV280-013"
