extraction_passes:
  - date: "2026-05-06"
    by: "assistant under steward direction"
    scope: >
      Initial full-body extraction from the open-access NIST author-
      deposit PDF (6 pages). Sections covered: prior-art context for
      Mg+ light sources, two VECSEL designs (IC externally-quadrupled
      and VC intracavity-doubled), output powers and slope efficiencies,
      frequency-stability characterisation, ion-trapping spectroscopy,
      and resolved sideband cooling fidelity. Future-work conclusion
      identifies LiNbO3 waveguide doubler (NOT BBO 280 nm stage) as
      the bottleneck for power scaling. Status promoted from SCAFFOLD
      to DRAFT.
    status: "DRAFT"

cross_check_notes:
  - id: "BBO_not_the_bottleneck_in_VECSEL_architecture"
    summary: >
      §4 conclusion explicitly states that the limit on power scaling
      is the LiNbO3 waveguide doubler at the 1118 -> 559 nm stage, not
      the BBO 280 nm stage. The waveguide is operated below 300 mW SH
      to avoid damage. In the Burd2016 architecture, the BBO 280 nm
      stage is therefore *not* the binding component for power scaling
      -- a different conclusion than the Friedenauer-class assumption
      that the UV stage is the binding one (Friedenauer 2006 prediction
      B-2; cf. Friedenauer2006 extracted.yaml).
    resolution: >
      Useful boundary-condition observation for KD-UV280-015 Section C:
      VECSEL-pumped architectures may shift the bottleneck from the BBO
      280 nm stage to the visible-stage frequency converter (LiNbO3
      waveguide here, vs LBO crystal in Friedenauer 2006). Section C
      should track this divergence between architecture families.
    informs_dossier_entries:
      - "KD-UV280-015"
